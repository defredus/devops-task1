server {
    listen 80;
    server_name mysite.domain.com;
    root /var/www/mysite.domain.com;
    index index.html index.htm;

    # Логи
    access_log /var/log/nginx/mysite.domain.com_access.log;
    error_log /var/log/nginx/mysite.domain.com_error.log;

    # Основные настройки
    location / {
        try_files $uri $uri/ =404;
    }

    # Сжатие статических файлов
    gzip on;
    gzip_types text/html text/css text/javascript application/javascript application/json;
    gzip_vary on;
    gzip_min_length 1000;

    # Кэширование статики
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
